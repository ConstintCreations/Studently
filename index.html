<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js" defer></script>
    <script src="settings.js" defer></script>
    <script src="stations.js" defer></script>
    <script src="bell-timer.js" defer></script>
    <script src="pickr.js" defer></script>
    <title>Studently</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400" rel="stylesheet">
    <script src="https://kit.fontawesome.com/da7fda860c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings">
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="stations">
        <ion-icon name="albums" class="stations-icon"></ion-icon>
    </div>
    <div class="settings-sidebar">
        <div class="sidebar-item" class="theme-setting">
            <p class="setting-title"><i class="fa-solid fa-palette setting-icon"></i>Theme</p>
            <div class="setting-item">
                <p class="setting-key primary-color-setting">
                    Primary Color:
                </p>
                <div class="color-picker-primary"></div>
            </div>
            <div class="setting-item">
                <p class="setting-key secondary-color-setting">
                    Secondary Color:
                </p>
                <div class="color-picker-secondary"></div>
            </div>
            <div class="setting-item">
                <p class="setting-key text-color-setting">
                    Text Color:
                </p>
                <div class="color-picker-text"></div>
            </div>
            <div class="setting-item">
                <p class="setting-key shadow-color-setting">
                    Shadow Color:
                </p>
                <div class="color-picker-shadow"></div>
            </div>
            <button class="reset-button reset-theme-button"></button>
        </div>
    </div>
    <div class="stations-sidebar">
        <p class="stations-title">Stations</p>
        <button class="station-button" id="0">
            <input name="station-name" type="text" class="station-name" value="Default" maxlength="12" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" disabled>
            <div class="inner-station-button-group">
                <i class="fa-solid fa-pen-to-square edit-station inner-station-button"></i>
                <i class="fa-solid fa-trash-can remove-station inner-station-button"></i>
            </div>
        </button>
        <div class="station-bottom-buttons">
            <button class="new-station-button">
                <i class="fa-solid fa-plus"></i>
            </button>
            <button class="reset-stations-button reset-button">

            </button>
        </div>
        
    </div>
    <div class="main">
        <div class="bell-timer widget">
            <i class="fa-solid fa-bell bell-icon"></i>
            <p class="timer-text no-select">
                
            </p>
            <p class="timer-subtext no-select">
                
            </p>
        </div>
    </div>
</body>
</html>
